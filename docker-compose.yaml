services:
  # Nessie metadata database (persistent)
  nessie-postgres:
    image: postgres:16
    container_name: nessie-postgres
    environment:
      - POSTGRES_DB=nessie
      - POSTGRES_USER=nessie
      - POSTGRES_PASSWORD=nessie
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nessie -d nessie"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - nessie_db_data:/var/lib/postgresql/data
    networks:
      iceberg:

  # Nessie Catalog Server (Postgres-backed persistent store)
  nessie:
    image: projectnessie/nessie:latest
    container_name: nessie
    depends_on:
      nessie-postgres:
        condition: service_healthy
    environment:
      - NESSIE_VERSION_STORE_TYPE=JDBC
      - NESSIE_VERSION_STORE_PERSIST_JDBC_DATASOURCE=postgresql
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://nessie-postgres:5432/nessie
      - QUARKUS_DATASOURCE_USERNAME=nessie
      - QUARKUS_DATASOURCE_PASSWORD=nessie
    networks:
      iceberg:
    ports:
      - 19120:19120
  # Minio Storage Server
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
      - MINIO_DOMAIN=storage
      - MINIO_REGION_NAME=us-east-1
      - MINIO_REGION=us-east-1
    networks:
      iceberg:
    ports:
      - 9001:9001
      - 9000:9000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
    command: [ "server", "/data", "--console-address", ":9001" ]
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin password &&
      mc mb -p local/football-lake || true &&
      mc anonymous set private local/football-lake &&
      touch /tmp/.keep &&
      mc cp /tmp/.keep local/football-lake/bronze/.keep &&
      mc cp /tmp/.keep local/football-lake/silver/.keep &&
      mc cp /tmp/.keep local/football-lake/gold/.keep &&
      echo 'MinIO bucket football-lake with bronze/silver/gold prefixes is ready.'
      "
    networks:
      iceberg:
    restart: "no"

  spark:
    image: apache/spark:3.5.1-scala2.12-java17-python3-r-ubuntu
    container_name: spark
    depends_on:
      nessie:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
    environment:
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ./:/opt/spark/work-dir
      - ./spark/jars:/opt/spark/jars-extra
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    networks:
      iceberg:
    ports:
      - 8080:8080
      - 7077:7077

  spark-worker:
    image: apache/spark:3.5.1-scala2.12-java17-python3-r-ubuntu
    container_name: spark-worker
    depends_on:
      spark:
        condition: service_started
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark:7077
    environment:
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ./:/opt/spark/work-dir
      - ./spark/jars:/opt/spark/jars-extra
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    networks:
      iceberg:
    ports:
      - 8081:8081

  jupyter:
    image: apache/spark:3.5.1-scala2.12-java17-python3-r-ubuntu
    container_name: jupyter
    depends_on:
      spark:
        condition: service_started
      spark-worker:
        condition: service_started
      nessie:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      - SPARK_MASTER=spark://spark:7077
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - PYSPARK_PYTHON=python3
      - PYTHONPATH=/opt/spark/python:/opt/spark/python/lib/py4j-0.10.9.7-src.zip
    volumes:
      - ./:/opt/spark/work-dir
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./spark/jars:/opt/spark/jars-extra
    working_dir: /opt/spark/work-dir
    command:
      - /bin/bash
      - -lc
      - |
        export HOME=/tmp &&
        export PATH=/tmp/.local/bin:$PATH &&
        export PYTHONPATH=/opt/spark/python:/opt/spark/python/lib/py4j-0.10.9.7-src.zip &&
        pip install --no-cache-dir --user jupyterlab ipykernel &&
        python3 -m ipykernel install --user --name footballiq-spark --display-name "FootballIQ Spark (PySpark)" &&
        /tmp/.local/bin/jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --NotebookApp.token=footballiq --NotebookApp.allow_origin='*'
    networks:
      iceberg:
    ports:
      - 8888:8888

  # Dremio
  dremio:
    platform: linux/x86_64
    image: dremio/dremio-oss:latest
    depends_on:
      nessie:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - 9047:9047
      - 31010:31010
      - 32010:32010
    container_name: dremio
    environment:
      - DREMIO_JAVA_SERVER_EXTRA_OPTS=-Dpaths.dist=file:///opt/dremio/data/dist
    volumes:
      - dremio_data:/opt/dremio/data
    networks:
      iceberg:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9047"]
      interval: 20s
      timeout: 10s
      retries: 15

  # Airflow metadata DB (separate from Nessie's Postgres)
  airflow-postgres:
    image: postgres:16
    container_name: airflow-postgres
    environment:
      - POSTGRES_DB=airflow
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    networks:
      iceberg:

  # One-shot bootstrap: db migrate + admin user
  airflow-init:
    build:
      context: ./docker/airflow
    image: footballiq/airflow:2.9.3
    container_name: airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    user: "0:0"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY:-footballiq-airflow-secret}
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_USERNAME=${AIRFLOW_ADMIN_USERNAME:-admin}
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:-admin}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        airflow db migrate
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Admin --lastname Admin \
          --role Admin --email admin@example.com || true
        airflow pools set spark_jobs 1 "Single-writer pool for Spark/Iceberg jobs"
        chmod -R 0777 /opt/airflow/work-dir/data || true
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/airflow/jobs
      - ./ingestion:/opt/airflow/ingestion
      - ./scripts:/opt/airflow/scripts
      - ./:/opt/airflow/work-dir
      - airflow_logs:/opt/airflow/logs
    networks:
      iceberg:
    restart: "no"

  airflow-webserver:
    build:
      context: ./docker/airflow
    image: footballiq/airflow:2.9.3
    container_name: airflow-webserver
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    user: "0:0"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY:-footballiq-airflow-secret}
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
      - FOOTBALLIQ_REPO_HOST_PATH=${PWD}
    command: webserver
    ports:
      - 8085:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/airflow/jobs
      - ./ingestion:/opt/airflow/ingestion
      - ./scripts:/opt/airflow/scripts
      - ./:/opt/airflow/work-dir
      - airflow_logs:/opt/airflow/logs
    networks:
      iceberg:

  airflow-scheduler:
    build:
      context: ./docker/airflow
    image: footballiq/airflow:2.9.3
    container_name: airflow-scheduler
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    user: "0:0"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY:-footballiq-airflow-secret}
      - AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL=10
      - FOOTBALLIQ_REPO_HOST_PATH=${PWD}
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$(hostname)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/airflow/jobs
      - ./ingestion:/opt/airflow/ingestion
      - ./scripts:/opt/airflow/scripts
      - ./:/opt/airflow/work-dir
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      iceberg:

volumes:
  minio_data:
  dremio_data:
  nessie_db_data:
  airflow_pg_data:
  airflow_logs:

networks:
  iceberg:
